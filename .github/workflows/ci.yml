name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('claw-code/rust/**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('claw-code/rust/**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: claw-code/rust/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('claw-code/rust/**/Cargo.lock') }}

      - name: Check formatting
        working-directory: claw-code/rust
        run: cargo fmt --check

      - name: Clippy
        working-directory: claw-code/rust
        run: cargo clippy --all-targets --all-features -- -W clippy::all -A clippy::uninlined_format_args

      - name: Check
        working-directory: claw-code/rust
        run: cargo check --workspace

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (optional)
        working-directory: frontend
        run: npm ci || true

      - name: TypeScript check (optional)
        working-directory: frontend
        run: npm run typecheck || true

      - name: ESLint check (optional)
        working-directory: frontend
        run: npm run lint || true

      - name: Build (optional)
        working-directory: frontend
        run: npm run build || true

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-check
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (optional)
        working-directory: frontend
        run: npm ci || true

      - name: Run tests (optional)
        working-directory: frontend
        run: npm run test || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/coverage

  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: claw-code/rust/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('claw-code/rust/**/Cargo.lock') }}

      - name: Test
        working-directory: claw-code/rust
        run: cargo test --workspace --all-features -- --nocapture

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (optional)
        working-directory: frontend
        run: npm ci || true

      - name: npm audit (optional)
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo audit (optional)
        working-directory: claw-code/rust
        run: |
          cargo install cargo-audit || true
          cargo audit || true

  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    needs: [frontend-check, rust-check]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Server
        working-directory: claw-code/rust
        run: cargo build --release -p server || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps (optional)
        working-directory: frontend
        run: npm ci || true

      - name: Build Frontend (optional)
        working-directory: frontend
        run: npm run build || true

      - name: Build Electron (optional)
        working-directory: frontend
        run: npm run electron:build || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codecraft-${{ matrix.os }}
          path: |
            frontend/release/**/*
            claw-code/rust/target/release/server
          if-no-files-found: warn

  lint-commits:
    name: Lint Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages follow conventional commits (optional)
        uses: wagoid/commitlint-github-action@v5
        continue-on-error: true
