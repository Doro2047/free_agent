name: Release and Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate version format
        if: steps.version.outputs.is_release == 'true'
        run: |
          if ! [[ ${{ steps.version.outputs.version }} =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Check if tag exists
        if: steps.version.outputs.is_release == 'true'
        run: |
          if git tag | grep -q "^v${{ steps.version.outputs.version }}$"; then
            echo "Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

  build-rust:
    name: Build Rust Backend
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      artifact_name: ${{ steps.build.outputs.artifact_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc
          components: llvm, mingw

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './claw-code/rust'

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build Rust binary
        id: build
        run: |
          cd claw-code/rust
          cargo build --release --target x86_64-pc-windows-gnu
          ls -la target/x86_64-pc-windows-gnu/release/*.exe

          echo "artifact_name=free-agent-backend" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: claw-code/rust/target/x86_64-pc-windows-gnu/release/server.exe
          retention-days: 5

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run lint
        run: |
          cd frontend
          npm run lint

      - name: Run type check
        run: |
          cd frontend
          npm run typecheck

      - name: Build production
        env:
          VITE_API_URL: ${{ vars.API_URL || 'https://api.free-agent.app' }}
          VITE_WS_URL: ${{ vars.WS_URL || 'wss://api.free-agent.app' }}
        run: |
          cd frontend
          npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 5

  build-electron:
    name: Build Electron App
    runs-on: ubuntu-latest
    needs: [build-rust, build-frontend]
    strategy:
      matrix:
        include:
          - platform: macos
            artifact: Free-Agent-macOS-universal.dmg
          - platform: windows
            artifact: Free-Agent-Windows.exe
          - platform: linux
            artifact: Free-Agent-Linux.AppImage
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Download Rust binary
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: claw-code/rust/

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build Electron app
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyinstaller
        run: pip install pyinstaller

      - name: Package Electron
        run: |
          cd frontend
          npm run electron:build -- --${{ matrix.platform }} --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}
          path: frontend/release/${{ matrix.artifact }}
          retention-days: 5

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.free-agent.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy to staging server
        run: |
          echo "Deploying to staging server..."
          # rsync -avz --delete dist/ user@staging-server:/var/www/free-agent/
          echo "Deployment to staging completed"

      - name: Notify success
        run: |
          echo "Staging deployment successful"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-electron, validate]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://free-agent.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: electron-*
          path: releases
          merge-multiple: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: releases/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to production
        run: |
          echo "Deploying v${{ needs.validate.outputs.version }} to production..."
          echo "Production deployment completed"

      - name: Notify success
        run: |
          echo "Production deployment v${{ needs.validate.outputs.version }} successful"

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:"- %s" v${{ needs.validate.outputs.version }}^..v${{ needs.validate.outputs.version }})
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          if ! git tag | grep -q "^v${{ needs.validate.outputs.version }}$"; then
            git tag v${{ needs.validate.outputs.version }}
            git push origin v${{ needs.validate.outputs.version }}
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Release v${{ needs.validate.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Downloads

            - [Windows (.exe)](https://github.com/${{ github.repository }}/releases/download/v${{ needs.validate.outputs.version }}/Free-Agent-Windows.exe)
            - [macOS (.dmg)](https://github.com/${{ github.repository }}/releases/download/v${{ needs.validate.outputs.version }}/Free-Agent-macOS-universal.dmg)
            - [Linux (.AppImage)](https://github.com/${{ github.repository }}/releases/download/v${{ needs.validate.outputs.version }}/Free-Agent-Linux.AppImage)
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, 'beta') || contains(needs.validate.outputs.version, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
