name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('../claw-code/rust/**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('../claw-code/rust/**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: ../claw-code/rust/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('../claw-code/rust/**/Cargo.lock') }}

      - name: Check formatting
        working-directory: ../claw-code/rust
        run: cargo fmt --check

      - name: Clippy
        working-directory: ../claw-code/rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check
        working-directory: ../claw-code/rust
        run: cargo check --workspace

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run typecheck || npm run tsc -- --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test -- --run

      - name: Build
        working-directory: frontend
        run: npm run build

  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: ../claw-code/rust/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('../claw-code/rust/**/Cargo.lock') }}

      - name: Test
        working-directory: ../claw-code/rust
        run: cargo test --workspace --all-features -- --nocapture

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo audit
        working-directory: ../claw-code/rust
        run: cargo install cargo-audit && cargo audit --deny warnings

  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Server
        working-directory: ../claw-code/rust
        run: cargo build --release -p server

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Build Electron
        working-directory: frontend
        run: npm run electron:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            frontend/release/**/*
          if-no-files-found: warn

  lint-changed:
    name: Lint Changed Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v44

      - name: Setup Node.js
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.changed.outputs.any_changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        if: steps.changed.outputs.any_changed == 'true'
        working-directory: frontend
        run: npx eslint ${{ steps.changed.outputs.all_changed_files }}
