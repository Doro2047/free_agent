version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - VITE_SERVER_URL=http://localhost:3000/api
    volumes:
      - ./free_agent/frontend:/app/frontend
      - ./claw-code:/app/claw-code
    ports:
      - "5173:5173"
      - "3000:3000"
    command: bash free_agent/scripts/dev.sh

  rust:
    build:
      context: ./claw-code/rust
      dockerfile: Dockerfile
    environment:
      - RUST_LOG=info
    volumes:
      - ./claw-code/rust:/app
      - rust-cargo:/usr/local/cargo/registry
    ports:
      - "3000:3000"

volumes:
  rust-cargo:
